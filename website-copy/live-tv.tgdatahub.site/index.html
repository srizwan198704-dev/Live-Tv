<body>
<div id="root"></div>
<style>
	.a2hs-banner {
		position: fixed;
		left: 50%;
		bottom: 20px;
		transform: translateX(-50%);
		width: min(92vw, 760px);
		z-index: 99999;
		display: none;
		background: linear-gradient(135deg, #111 0%, #191919 100%);
		color: #fff;
		border: 1px solid #3a3a3a;
		border-radius: 16px;
		padding: 18px;
		box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
		font-family: Arial, sans-serif;
	}

	.a2hs-row {
		display: flex;
		gap: 8px;
		align-items: center;
		justify-content: space-between;
	}

	.a2hs-text {
		font-size: 18px;
		font-weight: 700;
		line-height: 1.4;
		margin-right: 8px;
	}

	.a2hs-subtext {
		font-size: 14px;
		font-weight: 400;
		opacity: 0.92;
		margin-top: 6px;
	}

	.a2hs-actions {
		display: flex;
		gap: 8px;
		flex-shrink: 0;
	}

	.a2hs-btn {
		border: 0;
		border-radius: 10px;
		padding: 10px 14px;
		cursor: pointer;
		font-size: 14px;
		font-weight: 700;
	}

	.a2hs-btn-primary {
		background: #2f7cff;
		color: #fff;
	}

	.a2hs-btn-secondary {
		background: #2d2d2d;
		color: #d8d8d8;
	}

	@media (min-width: 768px) {
		.a2hs-banner {
			padding: 22px;
		}

		.a2hs-text {
			font-size: 22px;
		}

		.a2hs-subtext {
			font-size: 15px;
		}
	}
</style>

<div id="a2hsBanner" class="a2hs-banner" role="status" aria-live="polite">
	<div class="a2hs-row">
		<div>
			<div class="a2hs-text">Add This Site To Your Home Screen</div>
			<div class="a2hs-subtext">Faster open, app-like experience, and quick one-tap access.</div>
		</div>
		<div class="a2hs-actions">
			<button id="a2hsLater" class="a2hs-btn a2hs-btn-secondary" type="button">Later</button>
			<button id="a2hsAdd" class="a2hs-btn a2hs-btn-primary" type="button">Add</button>
		</div>
	</div>
</div>

<script>
	(function () {
		if ("serviceWorker" in navigator) {
			navigator.serviceWorker.register("/sw.js").catch(function () {
				// Ignore registration errors silently.
			});
		}

		var HOME_PATHS = { "/": true, "/index.html": true };
		if (!HOME_PATHS[window.location.pathname]) {
			return;
		}

		var promptKey = "a2hs-last-prompt-date";
		var today = new Date().toISOString().slice(0, 10);
		var lastPromptDate = localStorage.getItem(promptKey);

		// Do not show if the app is already opened from Home Screen.
		var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
		if (isStandalone) {
			return;
		}

		// Show at most once per day.
		if (lastPromptDate === today) {
			return;
		}

		var deferredPrompt = null;
		var banner = document.getElementById("a2hsBanner");
		var addBtn = document.getElementById("a2hsAdd");
		var laterBtn = document.getElementById("a2hsLater");

		if (!banner || !addBtn || !laterBtn) {
			return;
		}

		function markShownToday() {
			localStorage.setItem(promptKey, today);
		}

		function showBanner() {
			banner.style.display = "block";
		}

		function hideBanner() {
			banner.style.display = "none";
		}

		window.addEventListener("beforeinstallprompt", function (e) {
			e.preventDefault();
			deferredPrompt = e;
			console.log("[A2HS] beforeinstallprompt fired - native install available");
			showBanner();
		});

		// Fallback: If browser does not fire beforeinstallprompt within 1.5s, show daily reminder.
		window.setTimeout(function () {
			if (!deferredPrompt && banner.style.display !== "block") {
				console.log("[A2HS] beforeinstallprompt not fired - using fallback banner");
				showBanner();
			}
		}, 1500);

		addBtn.addEventListener("click", async function () {
			if (deferredPrompt) {
				deferredPrompt.prompt();
				try {
					var result = await deferredPrompt.userChoice;
					if (result && result.outcome === "accepted") {
						hideBanner();
					}
				} catch (err) {
					// Ignore prompt errors and keep UI stable.
				}
				deferredPrompt = null;
			} else {
				var info = banner.querySelector(".a2hs-subtext");
				if (info) {
					info.textContent = "Browser install prompt is not available yet. In Chrome, open menu and choose 'Install app'.";
				}
			}
		});

		laterBtn.addEventListener("click", function () {
			markShownToday();
			hideBanner();
		});
	})();
</script>
</body>
</html>
